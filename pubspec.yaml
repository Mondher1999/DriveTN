name: drivetn
description: "DriveTN - Tunisian car rental marketplace prototype."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.2.7
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  camera: ^0.11.0
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  lucide_icons: ^0.257.0
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
